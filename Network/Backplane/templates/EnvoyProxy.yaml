apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-config

spec:
  telemetry:
    accessLog:
      disable: true
      settings:
        - format:
            type: JSON
            json:
              status: "%RESPONSE_CODE%"
              message: "%LOCAL_REPLY_BODY%"

          sinks:
            - type: OpenTelemetry
              openTelemetry:
                port: 4317
                backendRefs:
                  - group: ''
                    kind: Service
                    name: dc1-k3s-node1-collectors-alloy
                    namespace: core-prod
                    port: 4317

                resources:
                  k8s.cluster.name: "dc1-k3s"
    tracing:
      # sample 1% of requests
      samplingRate: 0

      provider:
        port: 4317
        backendRefs:
          - group: ''
            kind: Service
            name: dc1-k3s-node1-collectors-alloy
            namespace: core-prod
            port: 4317

        type: OpenTelemetry

  mergeGateways: false
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        externalTrafficPolicy: Local

      envoyDeployment:
        replicas: 2
          
        container:
          resources:
            requests:
              cpu: '2'
              memory: 2Gi
            limits:
              cpu: '4'
              memory: 2Gi

        pod:
          labels:
            logs: loki-myloginspace
